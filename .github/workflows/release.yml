name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bunx wxt prepare

      - run: bun run icons
      - run: bun run check
      - run: bun run typecheck
      - run: bun test

      # Produce both Chrome MV3 and Firefox MV2 zips into .output/
      - run: bun run zip
      - run: bun run zip:firefox

      - name: Attach zips to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*.zip
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
